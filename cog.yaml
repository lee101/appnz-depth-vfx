build:
  gpu: true
  cuda: "12.8"
  python_version: "3.11"
  sdk_version: "0.21.0"
  python_requirements: requirements.txt
  system_packages:
    - ffmpeg
    - libgl1
    - libglib2.0-0
  run:
    - python -c "from huggingface_hub import snapshot_download; snapshot_download('depth-anything/Depth-Anything-V2-Small-hf', revision='5426e4f0f36572d16453bbda7a8389317b1bef99', local_dir='/weights/depth-anything-v2-small', allow_patterns=['*.json','*.safetensors'])"
image: ghcr.io/lee101/appnz-depth-vfx:latest
run: "predict.py:Runner"

