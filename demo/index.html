<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Depth VFX — open Cog</title>
    <style>
      :root {
        color-scheme: dark;
        font:
          15px/1.5 Inter,
          ui-sans-serif,
          system-ui;
        background: #07100e;
        color: #f4fff9;
        --mint: #70f7bd;
        --ink: #06100d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 12% 5%, #124b3d 0, transparent 36%),
          radial-gradient(circle at 90% 90%, #16304a 0, transparent 34%),
          #07100e;
        padding: 28px;
      }
      main {
        max-width: 1100px;
        margin: auto;
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 18px;
      }
      .panel {
        border: 1px solid #9dffd329;
        background: #0b1713e8;
        border-radius: 26px;
        padding: clamp(22px, 4vw, 48px);
        box-shadow: 0 28px 90px #0008;
      }
      .eyebrow {
        color: var(--mint);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      h1 {
        font-size: clamp(3rem, 8vw, 6.6rem);
        line-height: 0.83;
        letter-spacing: -0.065em;
        margin: 0.22em 0;
      }
      .lede {
        color: #b9ccc4;
        max-width: 45ch;
        font-size: 1.05rem;
      }
      .stage {
        min-height: 500px;
        display: grid;
        place-items: center;
        overflow: hidden;
        position: relative;
        background: linear-gradient(135deg, #0d251c, #09141c);
      }
      .orb {
        width: 72%;
        aspect-ratio: 1;
        border-radius: 40% 60% 57% 43%;
        background: radial-gradient(
          circle at 35% 30%,
          #fff 0 2%,
          #73ffd0 8%,
          #176c76 39%,
          #211848 72%
        );
        filter: drop-shadow(18px 24px 24px #0008);
        animation: float 5s ease-in-out infinite;
        transform: perspective(700px) rotateY(-8deg);
      }
      .rings {
        position: absolute;
        inset: 13%;
        border: 1px solid #7fffd455;
        border-radius: 50%;
        animation: spin 12s linear infinite;
      }
      .rings:after {
        content: "";
        position: absolute;
        inset: 13%;
        border: 1px dashed #7fffd477;
        border-radius: 50%;
      }
      @keyframes float {
        50% {
          transform: perspective(700px) rotateY(12deg) translateY(-12px);
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      label {
        display: block;
        margin-top: 16px;
        font-weight: 700;
        font-size: 0.8rem;
      }
      input,
      select,
      button {
        width: 100%;
        margin-top: 7px;
        padding: 13px 14px;
        border-radius: 12px;
        border: 1px solid #c5ffe42b;
        background: #06100d;
        color: white;
      }
      button {
        background: var(--mint);
        color: var(--ink);
        font-weight: 900;
        cursor: pointer;
        margin-top: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      small,
      #status {
        color: #90a69c;
      }
      a {
        color: var(--mint);
      }
      #result {
        max-width: 100%;
        max-height: 380px;
        border-radius: 16px;
        margin-top: 14px;
        display: none;
      }
      @media (max-width: 780px) {
        main {
          grid-template-columns: 1fr;
        }
        .stage {
          min-height: 330px;
        }
        h1 {
          font-size: 4rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <span class="eyebrow">Depth Anything V2 Small · Apache-2.0</span>
        <h1>Give stills a third dimension.</h1>
        <p class="lede">
          One open Cog turns any photograph into a depth pass, normal map,
          thermal depth study, or looping camera move. The 25M-parameter model
          stays warm and runs in half precision.
        </p>
        <label
          >Cog model id<input
            id="id"
            value="b55c2f71-32de-491d-b387-69635fd19575" /></label
        ><label
          >Source image<input id="file" type="file" accept="image/*"
        /></label>
        <div class="grid">
          <label
            >Effect<select id="effect">
              <option>parallax</option>
              <option>depth</option>
              <option>heatmap</option>
              <option>normals</option>
            </select></label
          ><label
            >Motion strength<input
              id="strength"
              type="range"
              min="0.1"
              max="1"
              value="0.55"
              step="0.05"
          /></label>
        </div>
        <button id="run">Create depth effect</button>
        <p id="status">
          Deploy from
          <a href="https://github.com/lee101/appnz-depth-vfx">GitHub</a>, then
          paste its model id.
        </p>
        <video id="result" controls loop autoplay muted></video
        ><img
          id="imageResult"
          alt="Generated depth effect"
          style="
            display: none;
            max-width: 100%;
            border-radius: 16px;
            margin-top: 14px;
          "
        />
      </section>
      <section class="panel stage" aria-label="Animated depth concept">
        <div class="rings"></div>
        <div class="orb"></div>
      </section>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const dataURL = (f) =>
        new Promise((ok) => {
          const r = new FileReader();
          r.onload = () => ok(r.result);
          r.readAsDataURL(f);
        });
      $("run").onclick = async () => {
        const f = $("file").files[0],
          id = $("id").value.trim();
        if (!f || !id) {
          $("status").textContent = "Choose an image and add a model id.";
          return;
        }
        try {
          $("status").textContent = "Estimating depth and rendering…";
          const response = await fetch(
            `https://app.nz/api/cogs/${encodeURIComponent(id)}/predict`,
            {
              method: "POST",
              credentials: "include",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                input: {
                  image: await dataURL(f),
                  effect: $("effect").value,
                  strength: Number($("strength").value),
                  seconds: 3,
                },
              }),
            },
          );
          const body = await response.json();
          if (!response.ok) throw new Error(body.error || "Prediction failed");
          const out = body.output || body.prediction?.output;
          if (out) {
            const video = $("effect").value === "parallax";
            $("result").style.display = video ? "block" : "none";
            $("imageResult").style.display = video ? "none" : "block";
            (video ? $("result") : $("imageResult")).src = out;
          }
          $("status").textContent = out
            ? "Done — rendered by your Cog."
            : "Queued — follow the run in Cog Studio.";
        } catch (error) {
          $("status").textContent = error.message;
        }
      };
    </script>
  </body>
</html>
